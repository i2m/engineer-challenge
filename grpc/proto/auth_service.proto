syntax = "proto3";

package auth_service;

service AuthService {
    rpc RegisterUser (RegisterUserRequestMessage) returns (AccountMessage);
    rpc AuthUser (AuthRequestMessage) returns (AccountMessage);
    rpc SendResetPasswordCode (SendResetPasswordCodeRequestMessage) returns (TextResponseMessage);
    rpc ResetPassword (ResetPasswordRequestMessage) returns (AccountMessage);
    rpc WhoAmI (EmptyRequestMessage) returns (AccountMessage);
}

message RegisterUserRequestMessage {
    string email = 1;
    string password = 2;
    string confirm_password = 3;
}

message AuthRequestMessage {
    string email = 1;
    string password = 2;
}

message SendResetPasswordCodeRequestMessage {
    string email = 1;
}

message ResetPasswordRequestMessage {
    string email = 1;
    string reset_password_code = 2;
    string password = 3;
    string confirm_password = 4;
}

message AccountMessage {
    string id = 1;
    string email = 2;
}

message TextResponseMessage {
    string message = 1;
}

message EmptyRequestMessage {}
